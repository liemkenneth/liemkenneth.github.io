<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ReharmLab mark: a piano octave with one key "recolored" gold -->
  <rect width="64" height="64" rx="14" fill="#191b20"/>
  <rect x="7" y="10" width="50" height="44" rx="5" fill="#101114"/>
  <!-- white keys -->
  <rect x="10" y="13" width="10" height="38" rx="2" fill="#e6e3da"/>
  <rect x="21.5" y="13" width="10" height="38" rx="2" fill="#e6e3da"/>
  <rect x="33" y="13" width="10" height="38" rx="2" fill="#e8b84a"/>
  <rect x="44.5" y="13" width="10" height="38" rx="2" fill="#e6e3da"/>
  <!-- black keys -->
  <rect x="16.5" y="13" width="7.5" height="22" rx="1.5" fill="#101114"/>
  <rect x="28" y="13" width="7.5" height="22" rx="1.5" fill="#101114"/>
  <rect x="39.5" y="13" width="7.5" height="22" rx="1.5" fill="#101114"/>
</svg>
